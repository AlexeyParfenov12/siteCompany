<!DOCTYPE html>
<html lang="en">
<head>
    <base target="_top">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ff8181;
        }
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ff8181;
            width: 70%;
            background-color: #ffffff;
            padding: 10px;
            margin: 20px;
            border-radius: 20px;
        }
        p {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 20px;
            text-align: center;
            opacity: 1;
        }
        #count {
            font-weight: bold;
            color: red;
        }
        .button-info {
            color: green;
        }
        input {
            width: 60%;
            padding: 12px 20px;
            margin: 8px 0;
            box-sizing: border-box;
            border-radius: 10px;
            height: 50px;
            font-size: 20px;
        }
        button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px 20px;
            margin: 8px 0;
            box-sizing: border-box;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 10px;
            width: 20%;
        }
    </style>
</head>
<body>
        <form action="">
        <p>Введите ваш email:</p>
        <input type="email" class="mail" required>
        <button type="submit" class="button">Отправить</button>
        </form>
    <script src="script2.js"></script>
</body>
</html>
