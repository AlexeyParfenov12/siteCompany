<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novatex - Введите почту</title>
    <link rel="stylesheet" href="./assets/style/style.css">
</head>
<body>
    <div class="filter"></div>
    
    <div class="container">
        <header class="header">
            <img src="./assets/img/logo.png" class="logo" alt="Novatex">
        </header>
        
        <main class="content">
            <div class="content-left">
                <h1 class="text-red-shadow title-input">ВВЕДИТЕ ПОЧТУ!</h1>
                <p class="paragraph">Почта поможет нам связаться с вами.</p>
                <div class="section-input">
                    <input type="email" class="mail" required placeholder="Ваш E-mail">
                    <button disabled class="button">Отправить</button>
                </div>
            </div>
            
            <img class="exc-mark" src="./assets/img/image_exc.png" alt="!">
        </main>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
